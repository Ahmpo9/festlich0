<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Festlich — Einladung</title>
<meta name="description" content="Digitale Einladung via Festlich">
<meta name="theme-color" content="#262019">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ═══════════════════════════════════════════════════
   FESTLICH INVITATION — Complete Design
   ═══════════════════════════════════════════════════ */
:root {
  --gold:    #A87C3E;
  --gold-lt: #C89855;
  --ivory:   #FAF8F3;
  --cream:   #F3EDE0;
  --sand:    #E5D8C3;
  --champ:   #CEB98A;
  --taupe:   #AE8E6C;
  --blush:   #DDB9AC;
  --ch:      #262019;
  --ch60:    #3F3828;
  --ch40:    #5C5442;
  --w:       #FEFCF9;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
html { scroll-behavior: smooth }
body {
  font-family: 'Jost', sans-serif;
  background: var(--w);
  color: var(--ch);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  line-height: 1.7;
}
img { display: block; max-width: 100% }
a { color: inherit; text-decoration: none }

/* ── LOADER ── */
#loader {
  position: fixed; inset: 0; background: var(--ivory); z-index: 999;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
.loader-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px; color: var(--ch); letter-spacing: .08em;
}
.loader-logo span { color: var(--gold) }
.loader-bar {
  width: 64px; height: 1px; background: var(--sand); position: relative; overflow: hidden;
}
.loader-bar::after {
  content: ''; position: absolute; inset: 0;
  background: var(--gold);
  animation: barSlide 1.4s ease-in-out infinite;
}
@keyframes barSlide {
  0% { transform: translateX(-100%) }
  100% { transform: translateX(100%) }
}

/* ── NOT FOUND ── */
#not-found {
  display: none; min-height: 100vh;
  align-items: center; justify-content: center;
  flex-direction: column; text-align: center; padding: 48px;
  background: linear-gradient(150deg, var(--ivory), var(--cream));
}
#not-found.show { display: flex }
.nf-ico { font-size: 64px; margin-bottom: 24px }
.nf-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 6vw, 54px); font-weight: 300;
  color: var(--ch); margin-bottom: 14px;
}
.nf-sub { font-size: 16px; color: var(--taupe); font-weight: 300; margin-bottom: 28px }
.nf-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--ch); color: var(--ivory); padding: 13px 28px;
  border-radius: 100px; font-family: 'Jost', sans-serif; font-size: 14px;
  transition: all .2s;
}
.nf-btn:hover { background: var(--ch60); transform: translateY(-1px) }

/* ── INVITATION ── */
#invitation { display: none }
#invitation.show { display: block }

/* ── HERO ── */
.hero {
  position: relative; min-height: 100svh;
  display: flex; align-items: flex-end; overflow: hidden;
}
.hero.no-img { background: linear-gradient(150deg, #5C4838 0%, #A87060 50%, #D8B8A8 100%) }
.hero-bg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; transform-origin: center center;
}
.hero-grad {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(38,32,25,.08) 0%, rgba(38,32,25,.72) 100%);
}
.hero-content {
  position: relative; z-index: 2;
  text-align: center; padding: 60px 28px 80px; width: 100%; color: white;
}
.hero-eyebrow {
  font-size: 10.5px; letter-spacing: .32em; text-transform: uppercase;
  opacity: .6; margin-bottom: 22px;
}
.hero-names {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(56px, 10vw, 110px); font-weight: 300;
  line-height: 1.04; letter-spacing: .02em;
  text-shadow: 0 2px 20px rgba(0,0,0,.2);
}
.hero-and {
  display: block; font-style: italic;
  opacity: .72; font-size: .62em; margin: 6px 0;
}
.hero-tagline {
  font-size: 15px; font-weight: 300; opacity: .75;
  letter-spacing: .08em; margin-top: 14px;
}
.hero-scroll {
  position: absolute; bottom: 28px; left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: white; opacity: .5; font-size: 10px;
  letter-spacing: .14em; text-transform: uppercase;
  animation: scrollBounce 2.2s ease-in-out infinite;
}
@keyframes scrollBounce {
  0%,100% { transform: translateX(-50%) translateY(0) }
  50% { transform: translateX(-50%) translateY(7px) }
}
.scroll-chevron {
  width: 18px; height: 18px;
  border-right: 1.5px solid white; border-bottom: 1.5px solid white;
  transform: rotate(45deg);
}

/* ── SHARED BLOCK ── */
.block { padding: 72px 28px }
.block-center { text-align: center }
.block-narrow { max-width: 640px; margin: 0 auto }

/* ── ORNAMENT DIVIDER ── */
.ornament {
  display: flex; align-items: center; justify-content: center;
  gap: 14px; margin-bottom: 44px;
}
.orn-line {
  flex: 1; max-width: 80px; height: 1px;
  background: linear-gradient(to right, transparent, var(--sand));
}
.orn-line.r { background: linear-gradient(to left, transparent, var(--sand)) }
.orn-line.light {
  background: linear-gradient(to right, transparent, rgba(250,248,243,.25));
}
.orn-line.light.r {
  background: linear-gradient(to left, transparent, rgba(250,248,243,.25));
}
.orn-sym { color: var(--gold); font-size: 14px; letter-spacing: .2em }

/* ── SECTION TITLES ── */
.sec-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 4vw, 44px); font-weight: 400;
  color: var(--ch); margin-bottom: 0;
}
.sec-title.light { color: white }
.sec-title.gold { color: var(--gold) }

/* ── QUOTE ── */
.quote-block {
  background: linear-gradient(150deg, var(--cream), var(--ivory));
  padding: 72px 40px; text-align: center; position: relative; overflow: hidden;
}
.quote-block::before {
  content: '\201C';
  position: absolute; top: -30px; left: 16px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 200px; font-weight: 300;
  color: var(--sand); line-height: 1; opacity: .5; pointer-events: none;
}
.quote-label {
  font-size: 10.5px; letter-spacing: .24em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 20px; position: relative;
}
.quote-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(22px, 4vw, 36px); font-weight: 300; font-style: italic;
  color: var(--ch60); line-height: 1.55; margin-bottom: 18px; position: relative;
}
.quote-source { font-size: 13px; color: var(--taupe); font-weight: 300; letter-spacing: .06em }

/* ── CALENDAR / DATE ── */
.date-block { background: var(--ch); padding: 72px 28px; text-align: center; color: white }
.cal-month {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 6vw, 52px); font-weight: 300; font-style: italic;
  color: var(--champ); letter-spacing: .08em; margin-bottom: 36px;
}
.cal-wrap { display: inline-block; max-width: 308px; width: 100%; margin: 0 auto }
.cal-wdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 8px }
.cal-wd {
  font-size: 9.5px; text-transform: uppercase; letter-spacing: .1em;
  color: rgba(250,248,243,.35); text-align: center; padding: 3px 0;
}
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px }
.cal-cell {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 300; color: rgba(250,248,243,.6);
  border-radius: 50%; transition: all .2s;
}
.cal-cell.empty { opacity: 0; pointer-events: none }
.cal-cell.past   { opacity: .22 }
.cal-cell.active {
  background: var(--gold); color: white; font-weight: 500;
  box-shadow: 0 0 22px rgba(168,124,62,.55);
}
/* ── COUNTDOWN ── */
.countdown {
  display: flex; gap: 12px; justify-content: center;
  margin-top: 44px; flex-wrap: wrap;
}
.cd-box {
  background: rgba(250,248,243,.07);
  border: 1px solid rgba(250,248,243,.14);
  border-radius: 14px; padding: 16px 18px;
  text-align: center; min-width: 72px;
}
.cd-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(30px, 6vw, 42px); font-weight: 400;
  color: var(--ivory); line-height: 1; display: block;
}
.cd-lbl {
  font-size: 9.5px; letter-spacing: .14em; text-transform: uppercase;
  opacity: .45; margin-top: 5px; color: white; display: block;
}

/* ── CEREMONY ── */
.ceremony-block { background: var(--w); padding: 72px 28px; text-align: center }
.ceremony-icon {
  width: 74px; height: 74px; border-radius: 50%;
  background: linear-gradient(135deg, var(--cream), var(--sand));
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px; font-size: 30px;
  box-shadow: 0 8px 28px rgba(38,32,25,.08);
}
.ceremony-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 4.5vw, 44px); font-weight: 400;
  color: var(--ch); margin-bottom: 24px;
}
.ceremony-venue { font-size: 18px; font-weight: 500; color: var(--ch); margin-bottom: 8px }
.ceremony-time {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--cream); border-radius: 100px;
  padding: 11px 24px; font-size: 16px; font-weight: 500;
  color: var(--ch); margin: 14px 0; letter-spacing: .03em;
}
.ceremony-addr {
  font-size: 15px; color: var(--taupe); font-weight: 300;
  line-height: 1.7; max-width: 380px; margin: 0 auto;
}
.ceremony-desc {
  font-size: 14px; color: var(--ch40); font-style: italic;
  margin-top: 16px; max-width: 440px; margin-left: auto; margin-right: auto;
}
.map-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--ch); color: var(--ivory); border: none;
  border-radius: 100px; padding: 14px 30px;
  font-family: 'Jost', sans-serif; font-size: 14px;
  cursor: pointer; text-decoration: none; margin-top: 22px;
  transition: all .22s; letter-spacing: .04em;
}
.map-btn:hover { background: var(--ch60); transform: translateY(-1px) }

/* ── WELCOME NOTE ── */
.welcome-block { background: var(--ivory); padding: 72px 28px; text-align: center }
.welcome-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(18px, 2.5vw, 26px); font-weight: 300; font-style: italic;
  color: var(--ch60); line-height: 1.72;
  max-width: 520px; margin: 0 auto;
}

/* ── TIMELINE ── */
.timeline-block { background: var(--cream); padding: 72px 28px }
.timeline-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 4vw, 44px); font-weight: 400;
  color: var(--ch); text-align: center; margin-bottom: 48px;
}
.timeline-list {
  max-width: 480px; margin: 0 auto;
  position: relative; padding-left: 52px;
}
.timeline-list::before {
  content: ''; position: absolute;
  left: 20px; top: 8px; bottom: 8px; width: 1px;
  background: linear-gradient(to bottom, transparent, var(--sand) 10%, var(--sand) 90%, transparent);
}
.timeline-item { position: relative; margin-bottom: 36px }
.timeline-item:last-child { margin-bottom: 0 }
.tl-dot {
  position: absolute; left: -52px;
  width: 40px; height: 40px; border-radius: 50%;
  background: white; border: 1.5px solid var(--sand);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; z-index: 1;
  box-shadow: 0 2px 8px rgba(38,32,25,.06);
}
.tl-time {
  font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 4px;
}
.tl-event { font-size: 16px; font-weight: 500; color: var(--ch); margin-bottom: 3px }
.tl-venue { font-size: 13.5px; color: var(--taupe); font-weight: 300 }

/* ── GALLERY ── */
.gallery-block { line-height: 0 }
.gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 3px }
.gallery-grid.single { grid-template-columns: 1fr }
.gallery-grid.three .gallery-cell:first-child { grid-column: span 2 }
.gallery-cell {
  overflow: hidden; position: relative;
  background: var(--cream); aspect-ratio: 4/3;
}
.gallery-cell.wide { aspect-ratio: 16/9 }
.gallery-cell.tall { aspect-ratio: 3/4 }
.gallery-img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .6s ease;
}
.gallery-cell:hover .gallery-img { transform: scale(1.05) }

/* ── EXTRAS ── */
.extras-block { background: var(--ivory); padding: 56px 28px; text-align: center }
.extras-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 18px; max-width: 580px; margin: 32px auto 0;
}
.extra-card {
  background: white; border-radius: 16px; padding: 24px 18px;
  border: 1px solid rgba(38,32,25,.07);
}
.extra-ico { font-size: 26px; margin-bottom: 10px }
.extra-title {
  font-size: 12px; font-weight: 500; color: var(--ch);
  margin-bottom: 5px; text-transform: uppercase; letter-spacing: .06em;
}
.extra-val { font-size: 14px; color: var(--taupe); font-weight: 300 }

/* ── RSVP ── */
.rsvp-block { background: var(--ch); padding: 72px 28px; text-align: center }
.rsvp-label {
  font-size: 10.5px; letter-spacing: .24em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 16px;
}
.rsvp-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 5vw, 52px); font-weight: 300;
  color: var(--ivory); margin-bottom: 8px;
}
.rsvp-sub { font-size: 15px; color: rgba(250,248,243,.45); font-weight: 300; margin-bottom: 30px }
.rsvp-deadline { font-size: 12.5px; color: rgba(250,248,243,.35); margin-bottom: 22px }
.rsvp-form { max-width: 420px; margin: 0 auto }
.rsvp-field {
  width: 100%; padding: 14px 16px;
  background: rgba(250,248,243,.07);
  border: 1.5px solid rgba(250,248,243,.14);
  border-radius: 10px; color: white;
  font-family: 'Jost', sans-serif; font-size: 14px;
  outline: none; margin-bottom: 10px; transition: border-color .2s;
}
.rsvp-field::placeholder { color: rgba(250,248,243,.3) }
.rsvp-field:focus { border-color: var(--gold) }
.rsvp-field option { background: #262019; color: white }
.rsvp-submit {
  width: 100%; background: linear-gradient(135deg, var(--gold), var(--gold-lt));
  color: white; border: none; border-radius: 10px; padding: 16px;
  font-family: 'Jost', sans-serif; font-size: 15px; cursor: pointer;
  transition: all .22s; letter-spacing: .04em; margin-top: 4px;
}
.rsvp-submit:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(168,124,62,.45) }
.rsvp-submit:disabled { opacity: .5; cursor: not-allowed; transform: none }
.rsvp-ok {
  background: rgba(34,197,94,.15); border: 1px solid rgba(34,197,94,.3);
  border-radius: 10px; padding: 20px; color: #86EFAC;
  font-size: 15px; margin-top: 14px; display: none; line-height: 1.5;
}
.rsvp-ok.show { display: block }

/* ── FOOTER ── */
.inv-footer { background: var(--ch); padding: 30px 28px; text-align: center }
.inv-footer-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; color: rgba(250,248,243,.35); letter-spacing: .06em;
}
.inv-footer-brand span { color: var(--gold) }

/* ── RESPONSIVE ── */
@media(max-width: 480px) {
  .block { padding: 56px 20px }
  .quote-block { padding: 56px 24px }
  .countdown { gap: 8px }
  .cd-box { min-width: 60px; padding: 13px 10px }
  .cd-num { font-size: 28px }
  .gallery-grid { grid-template-columns: 1fr }
  .gallery-grid .gallery-cell { aspect-ratio: 4/3 !important }
  .timeline-list { padding-left: 44px }
}
</style>
</head>

  <div class="loader-logo">Festlich<span>.</span></div>
  <div class="loader-bar"></div>

<!-- INVITATION (populated by JS) -->
<div id="invitation"></div>

<script>
/* ════════════════════════════════════════════════════════════════
   FESTLICH PUBLIC INVITATION PAGE
   URL format: festlich-invitation.html?slug=XXXX
   Works on: GitHub Pages, Netlify, local file, any static host
   ════════════════════════════════════════════════════════════════ */

const SUPA_URL = 'https://odtvcglpxojsyxstmbtq.supabase.co'
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kdHZjZ2xweG9qc3l4c3RtYnRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTg2MTAsImV4cCI6MjA5MDc5NDYxMH0.HjODTfOS4OAM2z4T3naX2xHzwikgD-r_H1v-wtgd7GM'
const sb = supabase.createClient(SUPA_URL, SUPA_KEY, { db: { schema: 'public' } })

/* ── READ SLUG ───────────────────────────────────────────────────
   Priority: ?slug= param → #hash → /e/path
──────────────────────────────────────────────────────────────── */
function readSlug() {
  // 1. Query string: festlich-invitation.html?slug=abc123 (PRIMARY)
  const p = new URLSearchParams(location.search)
  const s = p.get('slug')
  if (s && s.trim().length > 2) return s.trim()

  // 2. Hash: festlich-invitation.html#abc123
  const h = location.hash.replace('#', '').replace(/^\/?e\//, '').trim()
  if (h.length > 2) return h

  // 3. Path: /e/abc123 (if deployed with server routing)
  const m = location.pathname.match(/\/e\/([^/?#]+)/)
  if (m) return m[1]

  return null
}

/* ── MONTH NAMES ── */
const MONTHS_DE = ['Januar','Februar','März','April','Mai','Juni',
  'Juli','August','September','Oktober','November','Dezember']
const WDAYS_DE  = ['Mo','Di','Mi','Do','Fr','Sa','So']

/* ── BUILD CALENDAR HTML ── */
function buildCalendar(dateStr) {
  if (!dateStr) return ''
  const d = new Date(dateStr + 'T12:00:00')
  const yr = d.getFullYear(), mo = d.getMonth(), dy = d.getDate()
  const first = new Date(yr, mo, 1).getDay()
  const offset = first === 0 ? 6 : first - 1
  const total  = new Date(yr, mo + 1, 0).getDate()
  const today  = new Date(); today.setHours(0, 0, 0, 0)

  let cells = ''
  for (let i = 0; i < offset; i++) cells += '<div class="cal-cell empty"></div>'
  for (let dd = 1; dd <= total; dd++) {
    const isPast   = new Date(yr, mo, dd) < today
    const isActive = dd === dy
    let cls = 'cal-cell'
    if (isActive) cls += ' active'
    else if (isPast) cls += ' past'
    cells += `<div class="${cls}">${dd}</div>`
  }

  return `
    <div class="cal-month">${MONTHS_DE[mo]} ${yr}</div>
    <div class="cal-wrap">
      <div class="cal-wdays">${WDAYS_DE.map(w => `<div class="cal-wd">${w}</div>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
    </div>`
}

/* ── COUNTDOWN ENGINE ── */
let cdInterval = null
function startCountdown(dateStr, timeStr) {
  if (!dateStr) return

  // ceremony_time from Supabase can be 'HH:MM:SS' or 'HH:MM' or null
  let hm = '14:00'
  if (timeStr && typeof timeStr === 'string') {
    hm = timeStr.slice(0, 5) // always take first 5 chars: HH:MM
  }

  // Build target as local date — avoid timezone offset issues
  const parts = dateStr.split('-').map(Number) // [YYYY, MM, DD]
  const hmParts = hm.split(':').map(Number)    // [HH, MM]
  const target = new Date(parts[0], parts[1]-1, parts[2], hmParts[0]||14, hmParts[1]||0, 0)

  function pad(n) { return String(Math.max(0,n)).padStart(2, '0') }

  function tick() {
    const now  = Date.now()
    const diff = target.getTime() - now

    if (diff <= 0) {
      // Event is in the past or happening now
      ;['cd-d','cd-h','cd-m','cd-s'].forEach(id => {
        const e = document.getElementById(id)
        if (e) e.textContent = '00'
      })
      if (cdInterval) { clearInterval(cdInterval); cdInterval = null }
      // Show "Countdown beendet" label
      const cds = document.getElementById('cd-s')
      if (cds) {
        const lbl = cds.nextElementSibling
        if (lbl) lbl.textContent = 'Ende'
      }
      return
    }

    const d = Math.floor(diff / 86400000)
    const h = Math.floor(diff % 86400000 / 3600000)
    const m = Math.floor(diff % 3600000 / 60000)
    const s = Math.floor(diff % 60000 / 1000)

    const set = (id, v) => {
      const e = document.getElementById(id)
      if (e) e.textContent = pad(v)
    }
    set('cd-d', d); set('cd-h', h); set('cd-m', m); set('cd-s', s)
  }

  if (cdInterval) clearInterval(cdInterval)
  tick() // run immediately
  cdInterval = setInterval(tick, 1000)
}

/* ── FORMAT DATE (long) ── */
function fmtLong(dateStr) {
  if (!dateStr) return ''
  return new Date(dateStr + 'T12:00:00').toLocaleDateString('de-DE', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  })
}

/* ── RSVP SUBMIT ── */
async function submitRSVP(invId) {
  const name  = document.getElementById('rsvp-name')?.value.trim()
  const email = document.getElementById('rsvp-email')?.value.trim()
  const stat  = document.getElementById('rsvp-status')?.value
  const count = parseInt(document.getElementById('rsvp-count')?.value || '1')
  const meal  = document.getElementById('rsvp-meal')?.value || 'none'
  const msg   = document.getElementById('rsvp-msg')?.value.trim()

  if (!name) { alert('Bitte deinen Namen eingeben.'); return }

  const btn = document.getElementById('rsvp-submit-btn')
  if (btn) btn.disabled = true

  const { error } = await sb.from('rsvps').insert({
    invitation_id:   invId,
    guest_name:      name,
    guest_email:     email || '',
    attending:       stat === 'yes',
    guest_count:     count,
    meal_preference: meal,
    message:         msg || '',
  })

  if (error) {
    if (btn) btn.disabled = false
    alert('Fehler beim Speichern. Bitte erneut versuchen.\n' + error.message)
    console.error('[RSVP error]', error)
    return
  }

  const ok = document.getElementById('rsvp-ok')
  if (ok) ok.classList.add('show')
  if (btn) btn.style.display = 'none'
}

/* ── RENDER FULL INVITATION ── */
function render(inv, gallery) {
  // Page title
  const n1 = inv.host_name_1 || ''
  const n2 = inv.host_name_2 || ''

  const bf   = inv.font_body    || 'Lato'

  const tpl   = TEMPLATES[tplId] || TEMPLATES.classic
  const gold  = inv.theme_primary_color || tpl.gold
  const bg    = inv.theme_bg_color || tpl.bg

  // Load non-default fonts

        l.href = `https://fonts.googleapis.com/css2?family=${fn.replace(/ /g, '+')}:ital,wght@0,300;0,400;1,400&display=swap`

    .rsvp-submit { background: linear-gradient(135deg, ${gold}, ${gold}cc) !important }

  // ── HERO ──

      <div class="hero-eyebrow">— ${heroEvtLabel} —</div>
      <div class="hero-names">
        ${n1}

        ${n2}
      </div>

  // ── QUOTE ──

  // ── CEREMONY ──

  const ceremonyHTML = hasCeremony ? `
  <div class="ceremony-block">

/* ── NICHT-GEFUNDEN ANZEIGEN ─────────────────────────────────────
   Zeigt klare Fehlermeldung statt generischer 404-Seite
──────────────────────────────────────────────────────────────── */
function showError(title, lines) {
  document.getElementById('loader').style.display = 'none'
  const nf = document.getElementById('not-found')
  nf.innerHTML = `
    <div style="font-size:52px;margin-bottom:22px">💌</div>
    <div class="nf-title">${title}</div>
    <div class="nf-sub" style="max-width:420px;line-height:1.75;text-align:left;
      background:white;border-radius:14px;padding:20px 22px;border:1px solid rgba(38,32,25,.08)">
      ${lines.map(l => `<div style="margin-bottom:7px">• ${l}</div>`).join('')}
    </div>
    <a href="festlich-builder.html" class="nf-btn" style="margin-top:24px">← Zurück zum Dashboard</a>
  `
  nf.classList.add('show')
}

/* ── BOOT ───────────────────────────────────────────────────────
   Lädt Einladung aus Supabase anhand des ?slug= Parameters.
   Gibt präzise Fehlermeldung je nach Ursache aus.
──────────────────────────────────────────────────────────────── */
;(async () => {
  const slug = readSlug()

  // Kein Slug in der URL
  if (!slug) {
    showError('Kein Einladungslink', [
      'Diese URL enthält keinen Einladungs-Code.',
      'Öffne den Link aus dem Dashboard (QR-Code oder Link-kopieren).',
      'Format: festlich-invitation.html?slug=XXXX'
    ])
    return
  }

  // Schritt 1: Einladung suchen (OHNE is_published Filter)
  // → damit wir unterscheiden können ob sie existiert aber unveröffentlicht ist
  const { data: invRaw, error: e1 } = await sb
    .from('invitations')
    .select('id, title, is_published, slug, host_name_1, host_name_2, font_preset, owner_id')
    .eq('slug', slug)
    .maybeSingle()

  // Datenbankfehler (z.B. Tabelle existiert nicht)
  if (e1) {
    const isSchema = e1.code === 'PGRST200' || e1.message?.includes('relation') || e1.message?.includes('schema')
    if (isSchema) {
      showError('Datenbank nicht eingerichtet', [
        'Die Tabellen existieren noch nicht in Supabase.',
        'Führe festlich-setup.sql im Supabase SQL Editor aus.',
        'Dann diese Seite neu laden.',
        `Technisch: ${e1.message}`
      ])
    } else {
      showError('Datenbankfehler', [
        `Fehlercode: ${e1.code || 'unbekannt'}`,
        e1.message || 'Unbekannter Fehler',
        'Bitte öffne die Browser-Konsole (F12) für Details.'
      ])
    }
    return
  }

  // Einladung existiert nicht
  if (!invRaw) {
    showError(`Einladung „${slug}" nicht gefunden`, [
      'Der Slug existiert nicht in der Datenbank.',
      'Mögliche Ursachen:',
      '→ Link wurde falsch kopiert oder ist abgeschnitten',
      '→ Einladung wurde gelöscht',
      '→ SQL-Schema wurde noch nicht ausgeführt (keine Daten)',
      `Gesuchter Slug: ${slug}`
    ])
    return
  }

  // Einladung existiert aber ist NICHT veröffentlicht
  if (!invRaw.is_published) {
    showError(`Einladung noch nicht veröffentlicht`, [
      `Titel: „${invRaw.title || 'Unbenannte Einladung'}"`,
      'Diese Einladung ist noch ein Entwurf.',
      '→ Öffne den Builder → Editor-Tab',
      '→ Klicke oben rechts den Toggle „Veröffentlichen"',
      '→ Öffne dann diesen Link erneut'
    ])
    return
  }

  // Schritt 2: Vollständige Daten laden (jetzt wissen wir dass sie published ist)
  const { data: inv, error: e2 } = await sb
    .from('invitations')
    .select('*')
    .eq('slug', slug)
    .eq('is_published', true)
    .single()

  if (e2 || !inv) {
    // RLS blockiert — öffentliche SELECT Policy fehlt
    showError('Zugriff verweigert (RLS)', [
      'Die Einladung existiert, aber die Datenbank-Policy erlaubt keinen öffentlichen Zugriff.',
      'Führe dieses SQL in Supabase aus:',
      `<code style="background:#f5f5f5;padding:4px 8px;border-radius:4px;font-size:11px;display:block;margin-top:6px">CREATE POLICY "inv_pub" ON public.invitations FOR SELECT USING (is_published = TRUE);</code>`,
      `Fehler: ${e2?.message || 'nicht autorisiert'}`
    ])
    return
  }

  // Galerie laden
  const { data: gallery } = await sb
    .from('gallery_items')
    .select('*')
    .eq('invitation_id', inv.id)
    .order('sort_order')

  // Aufrufe zählen (fire & forget)
  sb.from('invitations')
    .update({ view_count: (inv.view_count || 0) + 1 })
    .eq('id', inv.id)

  // Einladung rendern
  render(inv, gallery || [])
  document.getElementById('loader').style.display = 'none'
})()
</script>
