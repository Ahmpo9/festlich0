<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Festlich — Einladung</title>
<meta name="theme-color" content="#262019">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Josefin+Sans:wght@300;400;600&family=Sacramento&family=Raleway:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════
   FESTLICH — PREMIUM TEMPLATE SYSTEM
   Templates: blossom · mono · eternal · verde · timeless
   ═══════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Jost',sans-serif;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;line-height:1.7;background:#FEFCF9;color:#262019}
img{display:block;max-width:100%}
a{text-decoration:none;color:inherit}
button{font-family:'Jost',sans-serif;cursor:pointer}
input,select,textarea{font-family:'Jost',sans-serif}

/* ── LOADER ── */
#loader{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;background:#FEFCF9}
.loader-logo{font-family:'Cormorant Garamond',serif;font-size:32px;
  color:#262019;letter-spacing:.08em}
.loader-logo span{color:#A87C3E}
.loader-bar{width:56px;height:1px;background:#E5D8C3;position:relative;overflow:hidden}
.loader-bar::after{content:'';position:absolute;inset:0;background:#A87C3E;
  animation:lbar 1.4s ease-in-out infinite}
@keyframes lbar{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* ── NOT FOUND ── */
#not-found{display:none;min-height:100vh;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:48px;
  background:linear-gradient(150deg,#FAF8F3,#F3EDE0)}
#not-found.show{display:flex}
.nf-ico{font-size:52px;margin-bottom:20px}
.nf-title{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,6vw,50px);
  font-weight:300;margin-bottom:12px}
.nf-sub{font-size:14px;color:#AE8E6C;font-weight:300;margin-bottom:6px;
  max-width:420px;line-height:1.7;text-align:left}
.nf-card{background:white;border-radius:14px;padding:20px 22px;margin:14px 0 22px;
  max-width:420px;width:100%;border:1px solid rgba(38,32,25,.08)}
.nf-btn{display:inline-flex;align-items:center;gap:8px;background:#262019;
  color:#FAF8F3;padding:12px 26px;border-radius:100px;font-size:14px;margin-top:8px}

/* ── INVITATION WRAPPER ── */
#invitation{display:none}
#invitation.show{display:block}

/* ═══════════════════════════════════════════════════════════
   SHARED UTILITIES
   ═══════════════════════════════════════════════════════════ */
.w-full{width:100%}
.text-center{text-align:center}
.mx-auto{margin-left:auto;margin-right:auto}

/* arch shape — used in multiple templates */
.arch{border-radius:999px 999px 0 0}
.arch-card{border-radius:999px 999px 20px 20px}
.circle{border-radius:50%}
.rounded-xl{border-radius:20px}
.rounded-lg{border-radius:14px}
.rounded-full{border-radius:100px}

/* countdown shared */
.cd-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:28px}
.cd-box{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:64px;padding:14px 12px;border-radius:12px}
.cd-num{font-size:clamp(28px,6vw,40px);line-height:1;font-weight:400;display:block}
.cd-lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  opacity:.5;margin-top:4px;display:block}

/* calendar shared */
.cal-outer{display:inline-block;max-width:296px;width:100%}
.cal-wdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px}
.cal-wd{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;
  text-align:center;padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-size:12.5px;font-weight:300;border-radius:50%}
.cal-cell.empty{opacity:0;pointer-events:none}
.cal-cell.past{opacity:.22}

/* rsvp form shared */
.rsvp-wrap{max-width:380px;margin:0 auto}
.rsvp-in{width:100%;padding:13px 16px;border-radius:10px;font-family:'Jost',sans-serif;
  font-size:14px;outline:none;margin-bottom:10px;transition:all .2s}
.rsvp-in::placeholder{opacity:.45}
.rsvp-sel{width:100%;padding:13px 16px;border-radius:10px;font-family:'Jost',sans-serif;
  font-size:14px;outline:none;margin-bottom:10px;cursor:pointer;appearance:none}
.rsvp-radio{display:flex;align-items:center;gap:10px;padding:10px 0;font-size:14px;cursor:pointer}
.rsvp-radio input{width:16px;height:16px;cursor:pointer}
.rsvp-submit{width:100%;border:none;padding:15px;font-family:'Jost',sans-serif;
  font-size:15px;cursor:pointer;transition:all .22s;letter-spacing:.04em;margin-top:6px;border-radius:10px}
.rsvp-submit:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.rsvp-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.rsvp-ok{border-radius:10px;padding:18px;font-size:15px;margin-top:14px;
  display:none;text-align:center;line-height:1.5}
.rsvp-ok.show{display:block}

/* map button shared */
.map-btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;
  border-radius:100px;font-family:'Jost',sans-serif;font-size:13.5px;
  cursor:pointer;text-decoration:none;transition:all .2s;border:none;margin-top:14px}
.map-btn:hover{transform:translateY(-1px)}

/* gallery grid shared */
.gal-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.gal-grid-1{display:grid;grid-template-columns:1fr;gap:4px}
.gal-cell{overflow:hidden;position:relative;background:#e8e0d8}
.gal-cell img{width:100%;height:100%;object-fit:cover;transition:transform .6s}
.gal-cell:hover img{transform:scale(1.05)}

/* timing/timeline shared */
.timing-row{display:flex;align-items:baseline;padding:10px 0;
  border-bottom:1px solid rgba(38,32,25,.07)}
.timing-row:last-child{border-bottom:none}
.timing-time{min-width:54px;font-size:13px;font-weight:500;opacity:.6}
.timing-label{font-size:14px}

/* ═══════════════════════════════════════════════════════════
   TEMPLATE 1 — BLOSSOM
   Lavender · Blush · Cherub · Arched sections
   ═══════════════════════════════════════════════════════════ */
.blossom{--b-bg:#F8F4FC;--b-card:#FFFFFF;--b-lavender:#C5BBDB;--b-lav-dk:#9080B0;
  --b-blush:#E8C8D0;--b-text:#3A2A4A;--b-gold:#C8A878;background:var(--b-bg)}

/* hero */
.blossom .hero-blossom{position:relative;min-height:100vh;overflow:hidden;
  display:flex;align-items:flex-end}
.blossom .hero-blossom-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.blossom .hero-blossom-grad{position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(60,40,80,.08),rgba(60,40,80,.6))}
.blossom .hero-arch-card{position:relative;z-index:2;
  background:rgba(255,255,255,.88);backdrop-filter:blur(12px);
  border-radius:999px 999px 0 0;
  padding:44px 32px 52px;margin:0 28px;width:calc(100% - 56px);text-align:center;
  box-shadow:0 -12px 60px rgba(60,40,80,.15)}
.blossom .hero-blossom-no-img{background:linear-gradient(160deg,#C5BBDB,#E8C8D0 50%,#F0E8F4)}
.blossom .b-names{font-family:'Great Vibes',cursive;font-size:clamp(44px,10vw,72px);
  color:var(--b-text);line-height:1.1;margin-bottom:8px}
.blossom .b-date{font-family:'Josefin Sans',sans-serif;font-size:13px;
  letter-spacing:.28em;text-transform:uppercase;color:var(--b-lav-dk);margin-bottom:4px}
.blossom .b-eyebrow{font-family:'Josefin Sans',sans-serif;font-size:10px;
  letter-spacing:.3em;text-transform:uppercase;color:var(--b-lav-dk);
  opacity:.7;margin-bottom:16px}

/* blossom sections */
.blossom .b-section{padding:52px 28px;text-align:center}
.blossom .b-section-dark{background:var(--b-lavender);color:white;padding:56px 28px;text-align:center}
.blossom .b-section-card{background:white;margin:0 16px;border-radius:20px;
  padding:36px 24px;box-shadow:0 8px 32px rgba(60,40,80,.1);text-align:center}
.blossom .b-title{font-family:'Great Vibes',cursive;font-size:clamp(32px,6vw,46px);
  color:var(--b-text);margin-bottom:18px}
.blossom .b-title-light{font-family:'Great Vibes',cursive;font-size:clamp(30px,5vw,42px);color:white;margin-bottom:18px}
.blossom .b-label{font-family:'Josefin Sans',sans-serif;font-size:10px;
  letter-spacing:.28em;text-transform:uppercase;color:var(--b-lav-dk);margin-bottom:14px}
.blossom .b-text{font-size:14px;color:#5A4A6A;font-weight:300;line-height:1.75}
.blossom .b-divider{width:60px;height:1px;background:var(--b-lavender);margin:20px auto}
.blossom .b-arch-img{width:160px;height:200px;border-radius:999px;object-fit:cover;
  margin:0 auto 20px;display:block;box-shadow:0 8px 28px rgba(60,40,80,.18)}

/* blossom cd */
.blossom .cd-box{background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.4);border-radius:14px}
.blossom .cd-num{font-family:'Cormorant Garamond',serif;color:white}
.blossom .cd-lbl{color:white}
.blossom .cal-month-title{font-family:'Great Vibes',cursive;font-size:38px;color:white;margin-bottom:20px}
.blossom .cal-wd{color:rgba(255,255,255,.5)}
.blossom .cal-cell{color:rgba(255,255,255,.7)}
.blossom .cal-cell.active{background:white;color:var(--b-lav-dk);font-weight:600}

/* blossom rsvp */
.blossom .rsvp-in{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35);color:white}
.blossom .rsvp-sel{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35);color:white}
.blossom .rsvp-sel option{background:#9080B0;color:white}
.blossom .rsvp-in::placeholder{color:rgba(255,255,255,.5)}
.blossom .rsvp-submit{background:white;color:var(--b-lav-dk);font-weight:500}
.blossom .rsvp-ok{background:rgba(255,255,255,.2);color:white}
.blossom .map-btn{background:var(--b-lav-dk);color:white}
.blossom .rsvp-radio{color:rgba(255,255,255,.85)}
.blossom .timing-row{border-color:rgba(255,255,255,.15)}
.blossom .timing-time{color:rgba(255,255,255,.7)}
.blossom .timing-label{color:white}

/* ═══════════════════════════════════════════════════════════
   TEMPLATE 2 — MONO
   Black · White · Editorial · Bold typography
   ═══════════════════════════════════════════════════════════ */
.mono{background:#FAFAFA;color:#111}
.mono .hero-mono{min-height:70vh;background:#111;display:flex;
  align-items:flex-end;position:relative;overflow:hidden}
.mono .hero-mono-img{position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;filter:grayscale(100%);opacity:.6}
.mono .hero-mono-content{position:relative;z-index:1;padding:48px 28px 52px;width:100%}
.mono .m-names{font-family:'Playfair Display',serif;font-size:clamp(42px,9vw,80px);
  font-weight:400;color:white;line-height:1.05;letter-spacing:-.01em}
.mono .m-amp{font-style:italic;display:block;font-size:.55em;opacity:.6;margin:4px 0}
.mono .m-date-badge{display:inline-block;border:1px solid rgba(255,255,255,.4);
  padding:7px 18px;border-radius:3px;font-size:11px;letter-spacing:.22em;
  text-transform:uppercase;color:rgba(255,255,255,.7);margin-top:14px}
.mono .m-section{padding:44px 28px;max-width:480px;margin:0 auto}
.mono .m-rule{height:1px;background:#111;margin:0 28px}
.mono .m-title{font-family:'Playfair Display',serif;font-size:clamp(26px,4vw,36px);
  font-style:italic;margin-bottom:18px;color:#111}
.mono .m-label{font-family:'Josefin Sans',sans-serif;font-size:10px;
  letter-spacing:.3em;text-transform:uppercase;color:#666;margin-bottom:12px}
.mono .m-text{font-size:14px;color:#444;font-weight:300;line-height:1.8}
.mono .m-quote-mark{font-family:'Playfair Display',serif;font-size:80px;
  line-height:.8;color:#DDD;display:block;margin-bottom:-10px}
.mono .m-cd-section{background:#111;padding:48px 28px;text-align:center}
.mono .cd-box{background:transparent;border:1px solid rgba(255,255,255,.2)}
.mono .cd-num{font-family:'Playfair Display',serif;color:white}
.mono .cd-lbl{color:rgba(255,255,255,.5)}
.mono .cal-month-title{font-family:'Playfair Display',serif;font-style:italic;
  font-size:36px;color:white;margin-bottom:20px}
.mono .cal-wd{color:rgba(255,255,255,.35)}
.mono .cal-cell{color:rgba(255,255,255,.65)}
.mono .cal-cell.active{background:white;color:#111;font-weight:600}
.mono .m-img-pair{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.mono .m-img-pair img{width:100%;aspect-ratio:3/4;object-fit:cover;
  filter:grayscale(100%)}
.mono .m-ceremony-row{display:flex;gap:16px;align-items:flex-start;
  padding:16px 0;border-bottom:1px solid #E8E8E8}
.mono .m-cer-ico{font-size:22px;flex-shrink:0;margin-top:2px}
.mono .m-cer-title{font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:#999;margin-bottom:4px}
.mono .m-cer-val{font-size:15px;font-weight:400;color:#111;margin-bottom:2px}
.mono .m-cer-sub{font-size:13px;color:#666;font-weight:300}
.mono .map-btn{background:#111;color:white;border-radius:3px}
.mono .rsvp-in{background:white;border:1.5px solid #DDD;color:#111}
.mono .rsvp-sel{background:white;border:1.5px solid #DDD;color:#111}
.mono .rsvp-in::placeholder{color:#AAA}
.mono .rsvp-submit{background:#111;color:white}
.mono .rsvp-ok{background:#F0F0F0;color:#111}
.mono .timing-time{font-family:'Josefin Sans',sans-serif;font-size:12px;letter-spacing:.1em}
.mono .timing-row{border-color:#E8E8E8}

/* ═══════════════════════════════════════════════════════════
   TEMPLATE 3 — ETERNAL
   Warm Ivory · Tan · Beach · Arch shapes · Rounded
   ═══════════════════════════════════════════════════════════ */
.eternal{--e-bg:#F8F5F0;--e-tan:#C4A882;--e-sand:#E8D8C0;--e-dark:#3A2E24;
  --e-text:#5A4838;background:var(--e-bg)}
.eternal .hero-eternal{position:relative;min-height:100vh;overflow:hidden;
  display:flex;align-items:flex-end}
.eternal .hero-eternal-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.eternal .hero-eternal-grad{position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,rgba(58,46,36,.65))}
.eternal .hero-eternal-no-img{background:linear-gradient(160deg,#D8C8B0,#C4A882 50%,#E8D8C0)}
.eternal .e-hero-content{position:relative;z-index:2;padding:44px 28px 60px;width:100%;text-align:center}
.eternal .e-hero-date{font-family:'Josefin Sans',sans-serif;font-size:clamp(36px,8vw,72px);
  font-weight:300;color:white;letter-spacing:.06em;line-height:1;margin-bottom:4px}
.eternal .e-hero-date-label{font-family:'Josefin Sans',sans-serif;font-size:10px;
  letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:20px}
.eternal .e-names{font-family:'Great Vibes',cursive;font-size:clamp(38px,8vw,60px);
  color:white;line-height:1.1}
.eternal .e-amp{color:rgba(255,255,255,.65);font-size:.7em}
.eternal .e-section{padding:48px 28px;text-align:center;background:var(--e-bg)}
.eternal .e-section-tan{padding:48px 28px;text-align:center;background:var(--e-sand)}
.eternal .e-title{font-family:'Great Vibes',cursive;font-size:clamp(30px,5vw,44px);
  color:var(--e-dark);margin-bottom:16px}
.eternal .e-label{font-family:'Josefin Sans',sans-serif;font-size:10px;
  letter-spacing:.28em;text-transform:uppercase;color:var(--e-tan);margin-bottom:12px}
.eternal .e-text{font-size:14px;color:var(--e-text);font-weight:300;line-height:1.8}
.eternal .e-arch-img{width:140px;height:180px;border-radius:999px;object-fit:cover;
  margin:0 auto 16px;display:block;box-shadow:0 8px 24px rgba(58,46,36,.15)}
.eternal .e-arch-img-lg{width:180px;height:230px;border-radius:999px;object-fit:cover;
  margin:0 auto;display:block;box-shadow:0 12px 32px rgba(58,46,36,.2)}
.eternal .e-divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.eternal .e-div-line{flex:1;height:1px;background:var(--e-sand)}
.eternal .e-div-sym{font-size:14px;color:var(--e-tan)}
.eternal .e-venue-card{background:white;border-radius:20px;padding:24px;
  margin:0 8px;box-shadow:0 4px 18px rgba(58,46,36,.08)}
.eternal .e-ico{font-size:28px;margin-bottom:10px}
.eternal .e-rsvp-section{background:var(--e-dark);padding:56px 28px;text-align:center}
.eternal .e-rsvp-title{font-family:'Great Vibes',cursive;font-size:clamp(36px,7vw,52px);
  color:white;margin-bottom:8px}
.eternal .rsvp-in{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.25);color:white}
.eternal .rsvp-sel{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.25);color:white}
.eternal .rsvp-sel option{background:var(--e-dark)}
.eternal .rsvp-in::placeholder{color:rgba(255,255,255,.4)}
.eternal .rsvp-submit{background:var(--e-tan);color:white;border-radius:100px}
.eternal .rsvp-ok{background:rgba(196,168,130,.2);color:white}
.eternal .rsvp-radio{color:rgba(255,255,255,.8)}
.eternal .map-btn{background:var(--e-tan);color:white}
.eternal .cd-box{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2)}
.eternal .cd-num{font-family:'Cormorant Garamond',serif;color:white}
.eternal .cd-lbl{color:rgba(255,255,255,.5)}
.eternal .cal-month-title{font-family:'Great Vibes',cursive;font-size:36px;
  color:var(--e-dark);margin-bottom:20px}
.eternal .cal-wd{color:var(--e-tan)}
.eternal .cal-cell{color:var(--e-text)}
.eternal .cal-cell.active{background:var(--e-dark);color:white}
.eternal .e-countdown-section{background:var(--e-bg);padding:36px 28px;text-align:center}
.eternal .cd-row-e .cd-box{background:var(--e-sand);border:none}
.eternal .cd-row-e .cd-num{color:var(--e-dark)}
.eternal .cd-row-e .cd-lbl{color:var(--e-tan)}
.eternal .timing-row{border-color:rgba(58,46,36,.1)}
.eternal .timing-time{color:var(--e-tan)}

/* ═══════════════════════════════════════════════════════════
   TEMPLATE 4 — VERDE
   Olive · Forest Green · Arch RSVP card · Bold images
   ═══════════════════════════════════════════════════════════ */
.verde{--v-green:#4A5E40;--v-lt:#7A8E6A;--v-bg:#F5F7F2;--v-cream:#F0EDE4;
  --v-dark:#2A3828;--v-text:#3A4830;background:var(--v-bg)}
.verde .hero-verde{position:relative;min-height:70vh;overflow:hidden;display:flex;flex-direction:column}
.verde .hero-verde-img-wrap{position:relative;flex:1;min-height:300px}
.verde .hero-verde-img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.verde .hero-verde-no-img{flex:1;min-height:300px;
  background:linear-gradient(160deg,#2A3828,#4A5E40 50%,#7A8E6A)}
.verde .hero-verde-bottom{background:white;padding:32px 24px 36px;text-align:center}
.verde .v-eyebrow{font-family:'Josefin Sans',sans-serif;font-size:10px;
  letter-spacing:.28em;text-transform:uppercase;color:var(--v-lt);margin-bottom:14px}
.verde .v-names{font-family:'Sacramento',cursive;font-size:clamp(40px,9vw,64px);
  color:var(--v-dark);line-height:1.1}
.verde .v-date{font-family:'Josefin Sans',sans-serif;font-size:12px;
  letter-spacing:.22em;text-transform:uppercase;color:var(--v-lt);margin-top:10px}
.verde .v-section{padding:48px 24px;background:var(--v-bg);text-align:center}
.verde .v-section-green{padding:56px 24px;background:var(--v-green);text-align:center;color:white}

/* ── SLUG READING ── */
function readSlug() {
  const p = new URLSearchParams(location.search)
  const s = p.get('slug')
  if (s && s.trim().length > 2) return s.trim()
  const h = location.hash.replace('#','').replace(/^\/?e\//,'').trim()
  if (h.length > 2) return h
  const m = location.pathname.match(/\/e\/([^/?#]+)/)
  if (m) return m[1]
  return null
}

/* ── CALENDAR ── */
const MONTHS_DE = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember']
const WDAYS_DE  = ['Mo','Di','Mi','Do','Fr','Sa','So']

function buildCalGrid(dateStr) {
  if (!dateStr) return ''
  const d = new Date(dateStr + 'T12:00:00')
  const yr=d.getFullYear(), mo=d.getMonth(), dy=d.getDate()
  const first=new Date(yr,mo,1).getDay()
  const offset=first===0?6:first-1
  const total=new Date(yr,mo+1,0).getDate()
  const today=new Date(); today.setHours(0,0,0,0)
  let cells=''
  for(let i=0;i<offset;i++) cells+=`<div class="cal-cell empty"></div>`
  for(let dd=1;dd<=total;dd++){
    const isActive=dd===dy
    const isPast=new Date(yr,mo,dd)<today
    let cls='cal-cell'+(isActive?' active':isPast?' past':'')
    cells+=`<div class="${cls}">${dd}</div>`
  }
  return { monthLabel: MONTHS_DE[mo]+' '+yr, cells, year:yr, month:mo, day:dy }
}

function calHTML(dateStr, monthClass='cal-month-title') {
  const c = buildCalGrid(dateStr)
  if (!c) return ''
  return `
    <div class="${monthClass}">${c.monthLabel}</div>
    <div class="cal-outer mx-auto">
      <div class="cal-wdays">${WDAYS_DE.map(w=>`<div class="cal-wd">${w}</div>`).join('')}</div>
      <div class="cal-grid">${c.cells}</div>
    </div>`
}

/* ── COUNTDOWN ── */
let cdTimer = null
function startCountdown(dateStr, timeStr) {
  if (!dateStr) return
  const hm = (timeStr||'14:00:00').slice(0,5)
  const p = dateStr.split('-').map(Number)
  const t = hm.split(':').map(Number)
  const target = new Date(p[0], p[1]-1, p[2], t[0]||14, t[1]||0, 0)

  function pad(n){ return String(Math.max(0,n)).padStart(2,'0') }
  function tick(){
    const diff = target.getTime() - Date.now()
    if (diff <= 0) {
      ;['cd-d','cd-h','cd-m','cd-s'].forEach(id=>{
        const e=document.getElementById(id); if(e)e.textContent='00'
      })
      clearInterval(cdTimer)
      return
    }
    const d=Math.floor(diff/86400000),h=Math.floor(diff%86400000/3600000),
          m=Math.floor(diff%3600000/60000),s=Math.floor(diff%60000/1000)
    const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=pad(v)}
    set('cd-d',d);set('cd-h',h);set('cd-m',m);set('cd-s',s)
  }
  if(cdTimer) clearInterval(cdTimer)
  tick()
  cdTimer=setInterval(tick,1000)
}

/* ── FORMAT DATE ── */
function fmtDate(s){
  if(!s)return''
  return new Date(s+'T12:00:00').toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})
}

/* ── RSVP ── */
async function submitRSVP(invId, hasMeal){
  const name=document.getElementById('rsvp-name')?.value.trim()
  const email=document.getElementById('rsvp-email')?.value.trim()
  const stat=document.getElementById('rsvp-status')?.value
  const count=parseInt(document.getElementById('rsvp-count')?.value||'1')
  const meal=hasMeal?(document.getElementById('rsvp-meal')?.value||'none'):'none'
  const msg=document.getElementById('rsvp-msg')?.value.trim()
  if(!name){alert('Bitte Namen eingeben');return}
  const btn=document.getElementById('rsvp-submit-btn')
  if(btn)btn.disabled=true
  const{error}=await sb.from('rsvps').insert({
    invitation_id:invId,guest_name:name,guest_email:email||'',
    attending:stat==='yes',guest_count:count,meal_preference:meal,message:msg||''
  })
  if(error){if(btn)btn.disabled=false;alert('Fehler: '+error.message);return}
  const ok=document.getElementById('rsvp-ok')
  if(ok)ok.classList.add('show')
  if(btn)btn.style.display='none'
}

/* ── PICK RENDERER ── */
function renderInvitation(inv, gallery){
  const tpl = inv.font_preset || 'timeless'

  // Load extra font if needed
  const extraFonts={blossom:'Great+Vibes',mono:'Playfair+Display',eternal:'Great+Vibes',verde:'Sacramento',timeless:'Cormorant+Garamond'}
  const fontParam=extraFonts[tpl]
  if(fontParam&&!document.getElementById('extfont-'+tpl)){
    const l=document.createElement('link');l.id='extfont-'+tpl;l.rel='stylesheet'
    l.href=`https://fonts.googleapis.com/css2?family=${fontParam}:ital,wght@0,400;1,400&display=swap`
    document.head.appendChild(l)
  }

  // Apply custom color override if set
  const gold=inv.theme_primary_color
  if(gold){
    const s=document.createElement('style')
    s.textContent=`:root{--override-gold:${gold}}.cal-cell.active{background:${gold}!important;box-shadow:0 0 16px ${gold}80!important}.rsvp-submit{background:${gold}!important}.map-btn{background:${gold}!important}`
    document.head.appendChild(s)
  }

  let html=''
  if(tpl==='blossom') html=renderBlossom(inv,gallery)
  else if(tpl==='mono') html=renderMono(inv,gallery)
  else if(tpl==='eternal') html=renderEternal(inv,gallery)
  else if(tpl==='verde') html=renderVerde(inv,gallery)
  else html=renderTimeless(inv,gallery) // default: timeless / classic

  document.getElementById('invitation').innerHTML=html
  document.getElementById('invitation').classList.add('show')

  if(inv.event_date){
    const t=(inv.ceremony_time||'14:00:00').slice(0,5)
    startCountdown(inv.event_date,t)
  }
}

/* ── BOOT ── */
function showError(title,lines){
  document.getElementById('loader').style.display='none'
  const nf=document.getElementById('not-found')
  document.querySelector('.nf-title').textContent=title
  const d=document.getElementById('nf-detail')
  if(d)d.innerHTML=lines.map(l=>`<div style="margin-bottom:5px">• ${l}</div>`).join('')
  nf.classList.add('show')
}

;(async()=>{
  const slug=readSlug()
  if(!slug){showError('Kein Einladungslink',['Kein ?slug= Parameter in der URL gefunden.','Öffne den Link aus dem Dashboard.']);return}

  // Try to find invitation (without is_published filter first)
  const{data:raw,error:e1}=await sb.from('invitations')
    .select('id,title,is_published,slug,host_name_1,host_name_2,font_preset,owner_id')
    .eq('slug',slug).maybeSingle()

  if(e1&&(e1.code==='PGRST200'||e1.message?.includes('relation'))){
    showError('Datenbank nicht eingerichtet',['festlich-setup.sql im Supabase SQL Editor ausführen.','Dann diese Seite neu laden.'])
    return
  }
  if(!raw){
    showError(`Einladung nicht gefunden`,['Slug: '+slug,'Link möglicherweise falsch kopiert.','Einladung wurde gelöscht.'])
    return
  }
  if(!raw.is_published){
    showError('Einladung noch nicht veröffentlicht',[`"${raw.title||'Einladung'}" ist noch ein Entwurf.`,'Im Dashboard → Editor → Toggle "Veröffentlichen" anklicken.'])
    return
  }

  const{data:inv,error:e2}=await sb.from('invitations').select('*').eq('slug',slug).eq('is_published',true).single()
  if(e2||!inv){
    showError('RLS fehlt',['Führe festlich-fix-rls.sql in Supabase aus.','Dann diese Seite neu laden.',e2?.message||''])
    return
  }

  const{data:gallery}=await sb.from('gallery_items').select('*').eq('invitation_id',inv.id).order('sort_order')
  sb.from('invitations').update({view_count:(inv.view_count||0)+1}).eq('id',inv.id)

  renderInvitation(inv,gallery||[])
  document.getElementById('loader').style.display='none'
})()
</script>
