<style>

/* ═══════════════════════════════════════════════════════════
   FESTLICH — ALL 5 TEMPLATES IN ONE FILE
   blossom · mono · eternal · verde · floral
   Template is auto-selected from font_preset in Supabase
   ═══════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Josefin Sans',sans-serif;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;max-width:480px;margin:0 auto}
img{display:block;max-width:100%}
a{text-decoration:none;color:inherit}
button{cursor:pointer}

/* ── LOADER ── */
#loader{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;background:#FAF8F4}
.loader-logo{font-family:'Great Vibes',cursive;font-size:36px;color:#3A2A2A}
.loader-logo span{color:#A87C3E}
.loader-bar{width:56px;height:1px;background:#E5D8C3;position:relative;overflow:hidden}
.loader-bar::after{content:'';position:absolute;inset:0;background:#A87C3E;
  animation:lb 1.4s ease-in-out infinite}
@keyframes lb{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* ── NOT FOUND ── */
#not-found{display:none;min-height:100vh;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:44px;background:#FAF8F4}
#not-found.show{display:flex}
.nf-ico{font-size:52px;margin-bottom:18px}
.nf-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;
  margin-bottom:12px;color:#2A1A2A}
.nf-card{background:white;border-radius:14px;padding:18px 20px;margin:12px 0 20px;
  max-width:360px;width:100%;font-size:13px;color:#666;line-height:1.8;text-align:left;
  border:1px solid #EEE}
.nf-btn{display:inline-flex;align-items:center;gap:8px;background:#2A1A2A;
  color:white;padding:12px 24px;border-radius:100px;font-size:13px}

/* ── INVITATION ── */
#invitation{display:none}
#invitation.show{display:block}

/* ══════════════════════════════════════════════════════════
   SHARED COMPONENTS (used across all templates)
   ══════════════════════════════════════════════════════════ */

/* Calendar */
.cal-outer{max-width:272px;margin:0 auto}
.cal-wdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-size:11.5px;font-weight:300;border-radius:50%}
.cal-cell.empty{opacity:0;pointer-events:none}
.cal-cell.past{opacity:.22}

/* Countdown boxes */
.cd-row{display:flex;gap:10px;justify-content:center;margin-top:28px;flex-wrap:wrap}
.cd-box{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:62px;padding:14px 12px;border-radius:12px;text-align:center}
.cd-num{font-size:clamp(26px,6vw,36px);line-height:1;display:block}
.cd-lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  opacity:.5;margin-top:4px;display:block}

/* Gallery */
.gal-2{display:grid;grid-template-columns:1fr 1fr;gap:3px;line-height:0}
.gal-1{line-height:0}
.gal-cell{overflow:hidden;position:relative}
.gal-cell img{width:100%;height:100%;object-fit:cover;transition:transform .6s}
.gal-cell:hover img{transform:scale(1.05)}

/* Timing */
.timing-row{display:flex;align-items:center;padding:9px 0;
  border-bottom:1px solid rgba(0,0,0,.07)}
.timing-row:last-child{border:none}
.timing-time{min-width:52px;font-size:12.5px;font-weight:400;letter-spacing:.05em}
.timing-dot{width:5px;height:5px;border-radius:50%;margin:0 12px;flex-shrink:0}
.timing-label{font-size:13.5px;font-weight:300}

/* RSVP fields */
.rsvp-wrap{max-width:340px;margin:0 auto}
.rf{width:100%;padding:13px 18px;font-family:'Josefin Sans',sans-serif;
  font-size:12.5px;outline:none;margin-bottom:10px;transition:all .2s}
.rf::placeholder{opacity:.45;letter-spacing:.06em;text-transform:uppercase}
.rsub{width:100%;border:none;padding:14px;font-family:'Josefin Sans',sans-serif;
  font-size:12.5px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;
  transition:all .22s;margin-top:4px}
.rsub:hover{transform:translateY(-1px)}
.rsub:disabled{opacity:.5;cursor:not-allowed;transform:none}
.rok{border-radius:12px;padding:16px;font-size:14px;margin-top:12px;
  display:none;text-align:center;line-height:1.5}
.rok.show{display:block}
.rradio{display:flex;gap:7px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.rr-btn{display:flex;align-items:center;gap:6px;cursor:pointer;
  font-size:12px;font-weight:300}
.rr-btn input{width:14px;height:14px}

/* Footer brand */
.fbrand{text-align:center;padding:24px}
.fbrand-txt{font-family:'Great Vibes',cursive;font-size:22px}
.fbrand-copy{font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  margin-top:6px;opacity:.35}

/* ══════════════════════════════════════════════════════════
   TEMPLATE 1: BLOSSOM
   Lavender · Angels · Arch card · Romantic · Floral
   ══════════════════════════════════════════════════════════ */
.t-blossom{background:#F4F0F8;color:#3A2A3A}

/* Hero */
.bl-hero{position:relative;min-height:100vh;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end}
.bl-hero-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.bl-hero-overlay{position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(168,148,188,.15) 0%,rgba(248,244,252,.0) 55%,rgba(244,240,248,1) 100%)}
.bl-hero-no-img{position:absolute;inset:0;
  background:linear-gradient(160deg,#C8B8D8 0%,#D8C8E8 30%,#E8D8F0 55%,#F4F0F8 100%)}
/* Fresco texture */
.bl-hero-texture{position:absolute;inset:0;opacity:.06;
  background-image:repeating-linear-gradient(45deg,#6A4A7A 0,#6A4A7A 1px,transparent 0,transparent 50%);
  background-size:6px 6px}
/* Flower garland */
.bl-flowers{position:absolute;top:0;left:0;right:0;z-index:3;
  display:flex;justify-content:center;align-items:flex-start;
  padding-top:8px;flex-wrap:wrap;gap:1px;line-height:1}
/* Angels */
.bl-angel{position:absolute;z-index:4;font-size:38px;
  filter:drop-shadow(0 2px 8px rgba(100,80,120,.25));user-select:none}
/* Arch card */
.bl-arch{position:relative;z-index:5;background:rgba(253,251,255,.94);
  backdrop-filter:blur(10px);border-radius:999px 999px 0 0;
  width:76%;padding:44px 26px 56px;text-align:center;
  box-shadow:0 -20px 70px rgba(140,120,170,.18)}
.bl-arch-eyebrow{font-family:'Cinzel',serif;font-size:8.5px;
  letter-spacing:.38em;text-transform:uppercase;color:#9080B0;margin-bottom:18px;display:block}
.bl-arch-names{font-family:'Great Vibes',cursive;font-size:clamp(38px,8vw,52px);
  color:#2A1A3A;line-height:1.1;margin-bottom:10px}
.bl-arch-amp{font-size:.72em;font-style:italic;color:#9080B0}
.bl-arch-date{font-family:'Cinzel',serif;font-size:10.5px;letter-spacing:.22em;color:#9080B0}
.bl-arch-tagline{font-size:11.5px;font-weight:300;color:#7A6A8A;font-style:italic;margin-top:10px;line-height:1.6}

/* Sections */
.bl-sec{padding:44px 22px;text-align:center;background:#F4F0F8}
.bl-sec-lav{padding:48px 22px;text-align:center;background:#B0A0C8;color:white;position:relative;overflow:hidden}
.bl-sec-lav::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(255,255,255,.08),transparent)}
.bl-sec-white{padding:40px 22px;text-align:center;background:white}
.bl-sec-dk{padding:40px 22px;text-align:center;background:#8070A0;color:white}

/* Typography */
.bl-title{font-family:'Great Vibes',cursive;font-size:clamp(30px,6vw,42px);color:#2A1A3A;margin-bottom:14px}
.bl-title-lt{font-family:'Great Vibes',cursive;font-size:clamp(28px,6vw,40px);color:white;margin-bottom:14px}
.bl-label{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.32em;
  text-transform:uppercase;color:#9080B0;margin-bottom:14px;display:block}
.bl-label-lt{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.28em;
  text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:14px;display:block}
.bl-text{font-size:13px;font-weight:300;color:#6A5A7A;line-height:1.82}
.bl-text-lt{font-size:13px;font-weight:300;color:rgba(255,255,255,.82);line-height:1.82}
.bl-italic{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(17px,3vw,22px)}

/* Quote card */
.bl-quote{background:white;border-radius:20px;padding:28px 22px;margin:0 6px;
  box-shadow:0 4px 24px rgba(140,120,170,.1);position:relative;overflow:hidden}
.bl-quote::before{content:'\201C';position:absolute;top:-14px;left:10px;
  font-family:'Cormorant Garamond',serif;font-size:110px;
  color:#E8E0F0;line-height:1;z-index:0}
.bl-quote-text{font-family:'Cormorant Garamond',serif;font-size:clamp(16px,3vw,20px);
  font-style:italic;color:#3A2A3A;line-height:1.72;position:relative;z-index:1}
.bl-quote-src{font-size:12px;color:#9080B0;margin-top:10px;letter-spacing:.08em}

/* Ceremony */
.bl-cer{background:white;border-radius:20px;padding:28px 22px;margin:0 6px;
  text-align:center;box-shadow:0 4px 20px rgba(140,120,170,.1)}
.bl-cer-ico{font-size:38px;margin-bottom:12px}
.bl-cer-title{font-family:'Great Vibes',cursive;font-size:34px;color:#2A1A3A;margin-bottom:12px}
.bl-cer-name{font-size:14.5px;font-weight:400;color:#2A1A3A;margin-bottom:6px}
.bl-cer-time{display:inline-flex;align-items:center;gap:7px;background:#F0EAF8;
  border-radius:100px;padding:9px 20px;font-size:13px;color:#9080B0;margin:10px 0}
.bl-cer-addr{font-size:13px;color:#7A6A8A;font-weight:300;line-height:1.65}
.bl-map-btn{display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,#B0A0C8,#9080B0);
  color:white;border:none;border-radius:100px;padding:10px 22px;
  font-family:'Josefin Sans',sans-serif;font-size:11.5px;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;text-decoration:none;margin-top:14px;
  box-shadow:0 4px 14px rgba(144,128,176,.3)}

/* Timing card */
.bl-timing{background:white;border-radius:18px;padding:24px 20px;margin:0 6px;
  box-shadow:0 4px 18px rgba(140,120,170,.08)}
.bl-timing-title{font-family:'Playfair Display',serif;font-style:italic;
  font-size:22px;color:#2A1A3A;text-align:center;margin-bottom:16px}
.bl-timing .timing-time{color:#9080B0}
.bl-timing .timing-label{color:#5A4A6A}

/* Cal/CD */
.bl-cal-month{font-family:'Playfair Display',serif;font-style:italic;
  font-size:30px;color:white;margin-bottom:20px}
.bl-cal-wd{font-size:9px;text-transform:uppercase;letter-spacing:.08em;
  color:rgba(255,255,255,.45);text-align:center;padding:2px 0}
.bl-cal .cal-cell{color:rgba(255,255,255,.72)}
.bl-cal .cal-cell.active{background:white;color:#9080B0;font-weight:600;
  box-shadow:0 0 16px rgba(255,255,255,.4)}
.bl-cd .cd-box{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3)}
.bl-cd .cd-num{font-family:'Cormorant Garamond',serif;color:white}
.bl-cd .cd-lbl{color:rgba(255,255,255,.5)}

/* RSVP */
.bl-rsvp-sec{background:#B0A0C8;padding:48px 22px;text-align:center}
.bl-rsvp-title{font-family:'Great Vibes',cursive;font-size:40px;color:white;margin-bottom:8px}
.bl-rsvp-sub{font-size:12.5px;font-weight:300;color:rgba(255,255,255,.75);margin-bottom:22px;line-height:1.6}
.bl-rsvp .rf{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.32);
  border-radius:100px;color:white;text-align:center}
.bl-rsvp .rf:focus{border-color:rgba(255,255,255,.6)}
.bl-rsvp .rsub{background:#C8A060;border-radius:100px;color:white;
  box-shadow:0 4px 16px rgba(200,160,96,.3)}
.bl-rsvp .rok{background:rgba(255,255,255,.2);color:white}
.bl-rsvp .rr-btn{color:rgba(255,255,255,.85)}
.bl-rsvp select.rf option{background:#9080B0;color:white}
.bl-rsvp select.rf{appearance:none}

/* ══════════════════════════════════════════════════════════
   TEMPLATE 2: MONO
   Black · White · Editorial · Bold serif
   ══════════════════════════════════════════════════════════ */
.t-mono{background:#FAFAFA;color:#111}

/* Hero */
.mn-hero{position:relative;background:#111;overflow:hidden}
.mn-hero-img{width:100%;height:64vh;object-fit:cover;display:block;
  filter:grayscale(100%);opacity:.72}
.mn-hero-no-img{height:64vh;background:#111}
.mn-hero-text{padding:36px 28px 44px;background:white;text-align:center}
.mn-names{font-family:'Playfair Display',serif;font-size:clamp(42px,9vw,72px);
  font-weight:400;color:#111;line-height:1.05;letter-spacing:-.01em}
.mn-amp{display:block;font-style:italic;font-size:.55em;opacity:.4;margin:4px 0}
.mn-date-frame{display:inline-block;border:1px solid rgba(0,0,0,.25);
  padding:7px 20px;border-radius:2px;font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:.28em;color:#666;margin-top:14px;text-transform:uppercase}

/* Sections */
.mn-sec{padding:40px 28px;background:white;max-width:480px;margin:0 auto}
.mn-rule{height:1px;background:#111;margin:0}
.mn-rule-lt{height:1px;background:#E8E8E8;margin:0}
.mn-sec-dk{padding:44px 28px;background:#111;color:white}
.mn-sec-gray{padding:40px 28px;background:#F4F4F4;max-width:480px;margin:0 auto}

/* Typography */
.mn-title{font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(26px,4.5vw,36px);color:#111;margin-bottom:16px}
.mn-title-lt{font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(24px,4vw,34px);color:white;margin-bottom:16px}
.mn-label{font-family:'Josefin Sans',sans-serif;font-size:9.5px;letter-spacing:.32em;
  text-transform:uppercase;color:#888;margin-bottom:13px;display:block}
.mn-label-lt{font-family:'Josefin Sans',sans-serif;font-size:9.5px;letter-spacing:.28em;
  text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:13px;display:block}
.mn-text{font-size:14px;color:#444;font-weight:300;line-height:1.82}
.mn-text-lt{font-size:14px;color:rgba(255,255,255,.72);font-weight:300;line-height:1.82}
.mn-quote-mark{font-family:'Playfair Display',serif;font-size:90px;
  line-height:.8;color:#DDD;display:block;margin-bottom:-10px}

/* Image pair B&W */
.mn-img-pair{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.mn-img-pair img{width:100%;aspect-ratio:3/4;object-fit:cover;filter:grayscale(100%);display:block}
.mn-img-single img{width:100%;height:52vw;max-height:250px;object-fit:cover;filter:grayscale(100%);display:block}

/* Ceremony */
.mn-cer-row{display:flex;gap:16px;align-items:flex-start;padding:16px 0;
  border-bottom:1px solid #EAEAEA}
.mn-cer-row:last-child{border:none}
.mn-cer-ico{font-size:24px;flex-shrink:0;margin-top:2px}
.mn-cer-lbl{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:#AAA;margin-bottom:3px}
.mn-cer-val{font-size:15.5px;font-weight:400;color:#111;margin-bottom:2px}
.mn-cer-sub{font-size:13px;color:#666;font-weight:300}
.mn-map-btn{display:inline-flex;align-items:center;gap:6px;
  background:#111;color:white;border:none;border-radius:2px;
  padding:10px 22px;font-family:'Josefin Sans',sans-serif;
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  cursor:pointer;text-decoration:none;margin-top:14px}

/* Cal/CD mono */
.mn-cal-month{font-family:'Playfair Display',serif;font-style:italic;
  font-size:32px;color:white;margin-bottom:22px;text-align:center}
.mn-cal-wd{font-size:9px;text-transform:uppercase;letter-spacing:.08em;
  color:rgba(255,255,255,.35);text-align:center;padding:2px 0}
.mn-cal .cal-cell{color:rgba(255,255,255,.65)}
.mn-cal .cal-cell.active{background:white;color:#111;font-weight:600}
.mn-cd .cd-box{background:transparent;border:1px solid rgba(255,255,255,.22)}
.mn-cd .cd-num{font-family:'Playfair Display',serif;color:white;font-size:clamp(32px,7vw,48px)}
.mn-cd .cd-lbl{color:rgba(255,255,255,.4);font-family:'Josefin Sans',sans-serif;font-size:9px}

/* RSVP mono */
.mn-rsvp .rf{background:white;border:1.5px solid #DDD;border-radius:3px;color:#111}
.mn-rsvp .rf:focus{border-color:#111}
.mn-rsvp .rsub{background:#111;color:white;border-radius:2px;
  font-weight:600;letter-spacing:.22em}
.mn-rsvp .rok{background:#F0F0F0;color:#111}
.mn-rsvp .rr-btn{color:#444}
.mn-rsvp select.rf{appearance:none}
.mn-rsvp .rr-btn input{accent-color:#111}
.mn-map-btns{display:flex;gap:8px;margin-top:8px}
.mn-map-pill{flex:1;text-align:center;padding:10px;border:1px solid #DDD;
  border-radius:2px;font-family:'Josefin Sans',sans-serif;font-size:11.5px;
  letter-spacing:.12em;text-transform:uppercase;color:#111;text-decoration:none;
  cursor:pointer;transition:all .2s;display:block}
.mn-map-pill:hover{background:#111;color:white}

/* ══════════════════════════════════════════════════════════
   TEMPLATE 3: ETERNAL
   Ivory · Tan · Stacked date numbers · Beach arch portrait
   ══════════════════════════════════════════════════════════ */
.t-eternal{background:#F8F5F0;color:#3A2E24}

/* Hero */
.et-hero{position:relative;min-height:100vh;overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-end}
.et-hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.et-hero-grad{position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 35%,rgba(58,46,36,.6) 100%)}
.et-hero-no-img{position:absolute;inset:0;
  background:linear-gradient(160deg,#D8C8B0 0%,#C4A882 50%,#B89060 100%)}
.et-hero-content{position:relative;z-index:2;padding:40px 28px 56px;color:white;text-align:center}
/* Big stacked date numbers */
.et-date-stack{display:flex;flex-direction:column;align-items:center;gap:0;
  margin-bottom:20px;line-height:1}
.et-date-num{font-family:'Josefin Sans',sans-serif;font-size:clamp(52px,12vw,84px);
  font-weight:200;letter-spacing:.08em;line-height:.95}

  if(!dateStr)return''
  const d=new Date(dateStr+'T12:00:00')
  const yr=d.getFullYear(),mo=d.getMonth(),dy=d.getDate()
  const first=new Date(yr,mo,1).getDay(),offset=first===0?6:first-1
  const total=new Date(yr,mo+1,0).getDate()
  const today=new Date();today.setHours(0,0,0,0)
  let cells=''
  for(let i=0;i<offset;i++)cells+=`<div class="cal-cell empty"></div>`
  for(let dd=1;dd<=total;dd++){
    const active=dd===dy,past=new Date(yr,mo,dd)<today
    cells+=`<div class="cal-cell${active?' active':past?' past':''}">${dd}</div>`
  }
  return `<div class="cal-outer">
    <div class="cal-wdays">${WD.map(w=>`<div class="${wdClass}">${w}</div>`).join('')}</div>
    <div class="cal-grid ${cellClass}">${cells}</div>
  </div>`
}

/* ── COUNTDOWN ── */
let cdTimer=null
function startCd(dateStr,timeStr){
  if(!dateStr)return
  const hm=(timeStr||'14:00:00').slice(0,5)
  const p=dateStr.split('-').map(Number),t=hm.split(':').map(Number)
  const target=new Date(p[0],p[1]-1,p[2],t[0]||14,t[1]||0,0)
  function pad(n){return String(Math.max(0,n)).padStart(2,'0')}
  function tick(){
    const diff=target.getTime()-Date.now()
    if(diff<=0){
      ;['cd-d','cd-h','cd-m','cd-s','cd-d2','cd-h2','cd-m2'].forEach(id=>{
        const e=document.getElementById(id);if(e)e.textContent='00'
      })
      clearInterval(cdTimer);return
    }
    const dv=Math.floor(diff/86400000),hv=Math.floor(diff%86400000/3600000),
          mv=Math.floor(diff%3600000/60000),sv=Math.floor(diff%60000/1000)
    ;[['cd-d',dv],['cd-h',hv],['cd-m',mv],['cd-s',sv],
      ['cd-d2',dv],['cd-h2',hv],['cd-m2',mv]].forEach(([id,v])=>{
      const e=document.getElementById(id);if(e)e.textContent=pad(v)
    })
  }
  if(cdTimer)clearInterval(cdTimer);tick();cdTimer=setInterval(tick,1000)
}

/* ── FORMAT ── */
const ICONS={church:'⛪',mosque:'🕌',registry:'🏛️',garden:'🌿',beach:'🌊',custom:'🏡'}
function fmtShort(s){if(!s)return'';const d=new Date(s+'T12:00:00');return`${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`}
function fmtLong(s){if(!s)return'';return new Date(s+'T12:00:00').toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function dateParts(s){if(!s)return{d:'',m:'',y:''};const d=new Date(s+'T12:00:00');return{d:String(d.getDate()).padStart(2,'0'),m:String(d.getMonth()+1).padStart(2,'0'),y:d.getFullYear()}}

/* ── RSVP ── */
async function submitRSVP(invId){
  const name=document.getElementById('rsvp-name')?.value.trim()
  const phone=document.getElementById('rsvp-phone')?.value.trim()
  const guests=document.getElementById('rsvp-guests')?.value
  const att=document.querySelector('input[name="attending"]:checked')?.value
  const meal=document.getElementById('rsvp-meal')?.value||'none'
  if(!name){alert('Bitte Namen eingeben');return}
  const btn=document.getElementById('rsvp-btn');if(btn)btn.disabled=true
  const{error}=await sb.from('rsvps').insert({
    invitation_id:invId,guest_name:name,guest_email:phone||'',
    attending:att!=='no',guest_count:parseInt(guests)||1,meal_preference:meal,message:''
  })
  if(error){if(btn)btn.disabled=false;alert('Fehler: '+error.message);return}
  const ok=document.getElementById('rsvp-ok');if(ok)ok.classList.add('show')
  if(btn)btn.style.display='none'
}

/* ═══════════════════════════════════════════════════════
   MAIN DISPATCHER — picks template from font_preset
   ═══════════════════════════════════════════════════════ */
function renderInvitation(inv,gallery){
  const tpl=inv.font_preset||'floral'
  let html=''
  if(tpl==='blossom')      html=renderBlossom(inv,gallery)
  else if(tpl==='mono')    html=renderMono(inv,gallery)
  else if(tpl==='eternal') html=renderEternal(inv,gallery)
  else if(tpl==='verde')   html=renderVerde(inv,gallery)
  else                     html=renderFloral(inv,gallery) // default: floral / timeless

  const el=document.getElementById('invitation')
  el.innerHTML=html;el.classList.add('show')

  if(inv.event_date){
    const t=(inv.ceremony_time||'14:00:00').slice(0,5)
    startCd(inv.event_date,t)
  }
}

/* ── ERROR ── */
function showError(title,lines){
  document.getElementById('loader').style.display='none'
  document.querySelector('.nf-title').textContent=title
  const d=document.getElementById('nf-detail')
  if(d)d.innerHTML=lines.map(l=>`<div style="margin-bottom:5px">• ${l}</div>`).join('')
  document.getElementById('not-found').classList.add('show')
}

/* ── BOOT ── */
;(async()=>{
  const slug=readSlug()
  if(!slug){showError('Kein Link',['Kein ?slug= gefunden.','Öffne den Link aus dem Dashboard.']);return}
  const{data:raw,error:e1}=await sb.from('invitations')
    .select('id,title,is_published,slug').eq('slug',slug).maybeSingle()
  if(e1&&(e1.code==='PGRST200'||e1.message?.includes('relation'))){
    showError('Datenbank fehlt',['festlich-setup.sql in Supabase ausführen.']);return
  }
  if(!raw){showError('Einladung nicht gefunden',[`Slug: ${slug}`,'Link möglicherweise falsch kopiert.']);return}
  if(!raw.is_published){showError('Noch nicht veröffentlicht',['Im Dashboard → Editor → Toggle einschalten.','Dann erneut öffnen.']);return}
  const{data:inv,error:e2}=await sb.from('invitations').select('*').eq('slug',slug).eq('is_published',true).single()
  if(e2||!inv){showError('RLS fehlt',['festlich-fix-rls.sql in Supabase ausführen.',e2?.message||'']);return}
  const{data:gallery}=await sb.from('gallery_items').select('*').eq('invitation_id',inv.id).order('sort_order')
  sb.from('invitations').update({view_count:(inv.view_count||0)+1}).eq('id',inv.id)
  renderInvitation(inv,gallery||[])
  document.getElementById('loader').style.display='none'
})()
</script>

  <div style="max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">
    <div style="flex:1;min-width:260px;">
      <strong style="color:#CEB98A;font-weight:500;">🍪 Cookie-Hinweis</strong><br>
      <span style="opacity:.85;font-size:12px;">Wir verwenden technisch notwendige Cookies und localStorage für Login und Einladungsdaten. <a href="#" style="color:#CEB98A;text-decoration:underline;" onclick="alert('Datenschutzerklärung folgt.')">Datenschutz</a></span>
    </div>
    <div style="display:flex;gap:10px;flex-shrink:0;">
      <button onclick="acceptCookies()" style="background:linear-gradient(135deg,#A87C3E,#C89855);color:white;border:none;padding:9px 18px;border-radius:100px;cursor:pointer;font-family:'Jost',sans-serif;font-size:12.5px;font-weight:500;white-space:nowrap;">Akzeptieren</button>
      <button onclick="declineCookies()" style="background:rgba(255,255,255,.1);color:#FAF8F3;border:1px solid rgba(255,255,255,.2);padding:9px 16px;border-radius:100px;cursor:pointer;font-family:'Jost',sans-serif;font-size:12.5px;white-space:nowrap;">Ablehnen</button>
    </div>
  </div>
</div>
<script>
(function(){
  const consent = localStorage.getItem('festlich_cookie_consent');
  const banner = document.getElementById('cookie-banner');
  if (!consent && banner) banner.style.display = 'block';
  window.acceptCookies = function(){
    localStorage.setItem('festlich_cookie_consent', 'accepted');
    if (banner) banner.style.transform = 'translateY(100%)';
    setTimeout(function(){ if(banner) banner.style.display='none'; }, 400);
  };
  window.declineCookies = function(){
    localStorage.setItem('festlich_cookie_consent', 'declined');
    if (banner) banner.style.transform = 'translateY(100%)';
    setTimeout(function(){ if(banner) banner.style.display='none'; }, 400);
  };
})();
</script>
